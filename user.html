<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#3b82f6"><link rel="manifest" href="manifest.json"><title>작업지시서 확인</title><style>:root{--b:#3b82f6;--ink:#0f172a;--muted:#64748b;--bg:#f5f7fb;--line:#dbe3ef}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:760px;margin:auto;padding:28px 18px 90px}h1{font-size:40px;margin:28px 0 8px}p{font-size:22px;line-height:1.45}.card{background:#fff;border:1px solid var(--line);border-radius:30px;padding:30px;margin:22px 0;box-shadow:0 8px 28px #33415512}.item{background:#f3f6fb;border-radius:24px;padding:24px;margin:18px 0}h2{font-size:32px;color:var(--b)}h3{font-size:25px}.muted{color:var(--muted)}button,a.btn{display:block;width:100%;background:var(--b);color:#fff;text-align:center;text-decoration:none;border:0;border-radius:22px;padding:20px;font-weight:900;font-size:24px;margin-top:12px}.media img{max-width:100%;border-radius:16px}.media iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:16px}.empty{text-align:center;margin-top:35vh}</style></head><body><div class="wrap"><div id="app"><div class="empty"><h2>불러오는 중...</h2></div></div></div><script src="firebase-config.js"></script><script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';import{getFirestore,collection,onSnapshot,addDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';let db,fb=false,orders=[];try{if(window.firebaseConfig&&window.firebaseConfig.apiKey&&!window.firebaseConfig.apiKey.includes('PASTE')){db=getFirestore(initializeApp(window.firebaseConfig));fb=true;onSnapshot(collection(db,'workOrders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdMs||0)-(a.createdMs||0));render();});}}catch(e){}if(!fb){orders=JSON.parse(localStorage.workOrdersFree||'[]');render()}function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function driveImage(url){const m=String(url).match(/\/d\/([^/]+)|id=([^&]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]||m[2]}&sz=w1000`:url}function youtube(url){const m=String(url).match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);return m?`https://www.youtube.com/embed/${m[1]}`:''}function media(i){let h='';if(i.photoUrl)h+=`<a href="${esc(i.photoUrl)}" target="_blank"><img src="${esc(driveImage(i.photoUrl))}" onerror="this.style.display='none'"></a><a class="btn" href="${esc(i.photoUrl)}" target="_blank">사진 크게 보기</a>`;if(i.videoUrl){const y=youtube(i.videoUrl);h+=y?`<iframe src="${esc(y)}" allowfullscreen></iframe>`:'';h+=`<a class="btn" href="${esc(i.videoUrl)}" target="_blank">동영상 보기</a>`}return h}window.confirmRead=async(id)=>{const name=prompt('작업자 이름을 입력하세요.');if(!name)return;if(fb)await addDoc(collection(db,'workOrders',id,'confirmations'),{name,createdAt:serverTimestamp(),createdMs:Date.now()});alert('확인 완료되었습니다.')}function render(){if(!orders.length){app.innerHTML='<div class="empty"><h2>등록된 작업지시서가 없습니다.</h2><p class="muted">관리자가 지시서를 등록하면 이곳에 표시됩니다.</p></div>';return}const o=orders[0];app.innerHTML=`<h1>작업지시서 확인</h1><p class="muted">최신 지시서가 자동으로 표시됩니다.</p><div class="card"><h2>${esc(o.product)}</h2><p><b>수량</b> : ${esc(o.qty||'')}<br><b>납품일</b> : ${esc(o.delivery||'')}</p><p>${esc(o.note||'').replaceAll('\n','<br>')}</p>${(o.items||[]).map(i=>`<div class="item"><h3>작업 항목 ${i.no}. ${esc(i.title)}</h3><p>${esc(i.desc||'').replaceAll('\n','<br>')}</p><div class="media">${media(i)}</div></div>`).join('')}<button onclick="confirmRead('${o.id}')">확인 완료</button><button onclick="navigator.clipboard.writeText(location.href).then(()=>alert('주소 복사 완료'))">카카오톡 공유용 주소 복사</button></div>`}if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script></body></html>
