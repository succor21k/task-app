<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3b82f6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>작업지시서 신규 등록</title>
<style>
:root{--blue:#3b82f6;--blue2:#2563eb;--ink:#0f172a;--muted:#64748b;--bg:#f5f7fb;--card:#fff;--line:#dbe3ef;--soft:#f1f5f9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:760px;margin:0 auto;padding:28px 18px 110px}h1{font-size:44px;line-height:1.12;margin:32px 0 12px;font-weight:900;letter-spacing:-1.5px}h2{font-size:34px;color:var(--blue);margin:0 0 26px;font-weight:900}h3{font-size:25px;margin:6px 0 22px;font-weight:900}.lead{font-size:24px;line-height:1.45;color:var(--muted);font-weight:800;margin:0 0 28px}.card{background:var(--card);border:1px solid var(--line);border-radius:32px;padding:36px;margin:28px 0;box-shadow:0 8px 28px #33415512}.divider{height:3px;background:#eaf1fb;margin:0 0 34px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}.field{margin:24px 0}.label{display:block;font-size:22px;font-weight:900;margin:0 0 12px}input,textarea,button,a.btn{font-family:inherit;font-size:24px;border-radius:22px;border:2px solid #dfe7f1;background:#f8fafc;padding:22px 26px;width:100%;outline:none;color:var(--ink)}textarea{min-height:136px;resize:vertical;line-height:1.45}input::placeholder,textarea::placeholder{color:#8b95a5}.item{background:#f3f6fb;border:2px dashed #cbd5e1;border-radius:28px;padding:34px;margin:30px 0}.fileHint{font-size:18px;color:var(--muted);line-height:1.4;margin-top:8px}.actions{position:fixed;left:0;right:0;bottom:0;background:#fffffff2;backdrop-filter:blur(8px);border-top:1px solid #e2e8f0;padding:14px 18px}.actionsIn{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}button,a.btn{border:0;background:var(--blue);color:white;font-weight:900;text-align:center;text-decoration:none;cursor:pointer}.primary{font-size:29px;border-radius:30px;padding:26px 18px;background:var(--blue)}.ghost{background:white;color:var(--blue);border:3px dashed var(--blue)}.danger{background:#ef4444}.smallbtn{font-size:20px;padding:16px;border-radius:18px}.saved{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;padding:14px 16px;border-radius:16px;margin:16px 0;font-weight:800}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:14px 16px;border-radius:16px;margin:16px 0;font-weight:800}.listCard{background:#fff;border-radius:22px;padding:20px;margin:14px 0;border:1px solid var(--line)}.listCard b{font-size:22px}.linkRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.topLinks{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}.photoLink{font-size:18px}@media(max-width:540px){.wrap{padding:22px 16px 105px}h1{font-size:38px}.lead{font-size:22px}.card{padding:30px 24px;border-radius:28px}h2{font-size:32px}.grid2{gap:14px}.label{font-size:21px}input,textarea{font-size:23px;padding:20px 22px}.item{padding:28px 22px}.actionsIn{grid-template-columns:1fr}.topLinks{grid-template-columns:1fr}.primary{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>작업지시서 신규 등록</h1>
  <p class="lead">현장 작업자들에게 전달할 지시서를 작성하고 샘플 미디어 링크를 등록하세요.</p>
  <div id="status" class="warn">Firestore 연결 확인 중...</div>
  <div class="topLinks"><a class="btn" href="user.html">사용자 화면 보기</a><button onclick="newForm()">새 지시서</button></div>

  <form id="form" onsubmit="return false">
    <section class="card">
      <h2>1. 기본 정보</h2><div class="divider"></div>
      <div class="field"><label class="label">제품명 (예: LEBEIGE)</label><input id="product" placeholder="제품명을 입력하세요"></div>
      <div class="grid2">
        <div class="field"><label class="label">수량 (예: 2,000개)</label><input id="qty" placeholder="작업 수량"></div>
        <div class="field"><label class="label">납품일</label><input id="delivery" placeholder="납품일정 기재"></div>
      </div>
      <div class="field"><label class="label">중요 안내사항 및 비고</label><textarea id="note" placeholder="예: 500개 먼저 작업 요망 / 한 줄 두 줄 섞이지 않게 주의"></textarea></div>
    </section>

    <section class="card">
      <h2>2. 세부 지시사항</h2><div class="divider"></div>
      <div id="items"></div>
      <button type="button" class="ghost" onclick="addItem()">+ 작업 항목 추가하기</button>
    </section>

    <button type="button" class="primary" onclick="saveCurrent()">작업지시서 등록 및 배포하기</button>
  </form>

  <section class="card">
    <h2>등록된 지시서</h2><div class="divider"></div>
    <div id="orderList"></div>
  </section>
</div>
<div class="actions"><div class="actionsIn"><button onclick="saveCurrent()">등록 및 배포</button><a class="btn" href="user.html">사용자 보기</a></div></div>
<script src="firebase-config.js"></script>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import {getFirestore,collection,addDoc,setDoc,doc,onSnapshot,deleteDoc,serverTimestamp} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';
let db, fb=false, editId='', orders=[];
const seed={date:new Date().toISOString().slice(0,10),product:'',qty:'',delivery:'',note:'',items:[
{title:'상깍지 테이프 작업',desc:'흰테이프 사용해서 한줄로',photoUrl:'',videoUrl:''},
{title:'상깍지 사용',desc:'상깍지 2개 사용 (1개는 테이프 작업, 1개는 그냥 사용)',photoUrl:'',videoUrl:''},
{title:'손잡이 글루건 작업',desc:'글루건 작업 전 샘플 확인',photoUrl:'',videoUrl:''},
{title:'옆선 테이프 작업',desc:'흰테이프 사용 / 선에서 5미리',photoUrl:'',videoUrl:''},
{title:'옆구리 붙이기 작업',desc:'선에서 2미리',photoUrl:'',videoUrl:''},
{title:'바닥 테이프 작업 (위쪽)',desc:'흰테이프 사용 / 일자(ㅡ) 모양',photoUrl:'',videoUrl:''},
{title:'바닥 테이프 작업 (아래쪽)',desc:'흰테이프 사용 / 돌리기',photoUrl:'',videoUrl:''}
]};
try{if(window.firebaseConfig&&window.firebaseConfig.apiKey&&!window.firebaseConfig.apiKey.includes('PASTE')){db=getFirestore(initializeApp(window.firebaseConfig));fb=true;status.className='saved';status.textContent='Firestore 연결됨 / Storage 없이 무료 방식으로 작동 중';onSnapshot(collection(db,'workOrders'),snap=>{orders=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdMs||0)-(a.createdMs||0));renderList();});}}catch(e){console.error(e)}
if(!fb){status.textContent='Firebase 설정 전입니다. 현재는 이 기기 임시저장으로 작동합니다.'; orders=JSON.parse(localStorage.workOrdersFree||'[]'); renderList();}
function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function itemHtml(it={},idx=0){return `<div class="item"><h3>작업 항목 ${idx+1}</h3><div class="field"><label class="label">작업 제목 (고정항목)</label><input class="it-title" value="${esc(it.title||'')}" placeholder="작업 제목"></div><div class="field"><label class="label">작업 설명</label><textarea class="it-desc" placeholder="작업 설명">${esc(it.desc||'')}</textarea></div><div class="field"><label class="label">카메라 촬영 / 샘플 사진 링크 (선택사항)</label><input class="it-photo photoLink" value="${esc(it.photoUrl||'')}" placeholder="Google Drive 사진 공유링크 붙여넣기"><div class="fileHint">무료 버전은 Storage를 쓰지 않으므로 파일 선택 대신 Google Drive 공유링크를 사용합니다.</div></div><div class="field"><label class="label">동영상 링크 (선택사항)</label><input class="it-video photoLink" value="${esc(it.videoUrl||'')}" placeholder="YouTube 또는 Google Drive 동영상 링크"></div><button type="button" class="danger smallbtn" onclick="this.closest('.item').remove(); renumber()">항목 삭제</button></div>`}
function fill(o=seed){editId=o.id||'';product.value=o.product||'';qty.value=o.qty||'';delivery.value=o.delivery||'';note.value=o.note||'';items.innerHTML=(o.items||[]).map(itemHtml).join('');renumber();scrollTo(0,0)}
window.renumber=()=>[...document.querySelectorAll('.item h3')].forEach((h,i)=>h.textContent='작업 항목 '+(i+1));
window.addItem=()=>{items.insertAdjacentHTML('beforeend',itemHtml({},document.querySelectorAll('.item').length));renumber()};
window.newForm=()=>fill(JSON.parse(JSON.stringify(seed)));
function collect(){return {id:editId,createdMs:Date.now(),date:new Date().toISOString().slice(0,10),product:product.value,qty:qty.value,delivery:delivery.value,note:note.value,items:[...document.querySelectorAll('.item')].map((el,i)=>({no:i+1,title:el.querySelector('.it-title').value,desc:el.querySelector('.it-desc').value,photoUrl:el.querySelector('.it-photo').value,videoUrl:el.querySelector('.it-video').value}))}}
window.saveCurrent=async()=>{const o=collect(); if(!o.product.trim()){alert('제품명을 입력하세요.');return} if(fb){if(editId) await setDoc(doc(db,'workOrders',editId),{...o,updatedAt:serverTimestamp()}); else await addDoc(collection(db,'workOrders'),{...o,createdAt:serverTimestamp()});}else{if(!o.id)o.id=Date.now()+'';const i=orders.findIndex(x=>x.id===o.id); if(i>=0)orders[i]=o; else orders.unshift(o); localStorage.workOrdersFree=JSON.stringify(orders); renderList();} alert('작업지시서가 등록되었습니다. 사용자 화면에 표시됩니다.');};
window.editOrder=id=>fill(orders.find(o=>o.id===id));
window.delOrder=async id=>{if(!confirm('삭제할까요?'))return; if(fb) await deleteDoc(doc(db,'workOrders',id)); else{orders=orders.filter(o=>o.id!==id);localStorage.workOrdersFree=JSON.stringify(orders);renderList();}};
window.exportCSV=id=>{const o=orders.find(x=>x.id===id)||collect();const rows=[['작성일',o.date],['제품명',o.product],['수량',o.qty],['납품일',o.delivery],[],['No','작업제목','작업설명','사진링크','동영상링크'],...(o.items||[]).map(i=>[i.no,i.title,i.desc,i.photoUrl,i.videoUrl]),[],['비고',o.note]];const csv='\ufeff'+rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='작업지시서_'+(o.product||'export')+'.csv';a.click()};
function renderList(){orderList.innerHTML=orders.length?orders.map(o=>`<div class="listCard"><b>${esc(o.product)}</b><p>${esc(o.qty||'')} / ${esc(o.delivery||'')}</p><div class="linkRow"><button class="smallbtn" onclick="editOrder('${o.id}')">수정</button><button class="smallbtn" onclick="exportCSV('${o.id}')">CSV</button></div><div class="linkRow"><button class="smallbtn danger" onclick="delOrder('${o.id}')">삭제</button><a class="btn smallbtn" href="user.html">사용자 확인</a></div></div>`).join(''):'<p class="lead">아직 등록된 지시서가 없습니다.</p>'}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
fill(seed);
</script>
</body>
</html>
