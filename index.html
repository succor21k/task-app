<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>모바일 작업지시서</title>
<style>
:root{--b:#2563eb;--g:#64748b;--bg:#f4f6f9;--line:#d7dee8;--ink:#122033}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:820px;margin:auto;padding:16px 14px 90px}.card{background:#fff;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 4px 18px #00000012}.top{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;margin:8px 0}h1{font-size:25px;margin:8px 0 14px}h2{font-size:22px}h3{font-size:18px;margin:18px 0 8px}input,textarea,button{font-size:16px;border-radius:13px;border:1px solid var(--line);padding:12px;width:100%;background:#fff}textarea{min-height:76px;resize:vertical}button{background:var(--b);color:#fff;font-weight:800;border:0;cursor:pointer}.ghost{background:#fff;color:var(--b);border:2px dashed var(--b)}.danger{background:#dc2626}.item{border:1px dashed #cbd5e1;background:#f8fafc;border-radius:16px;padding:13px;margin:12px 0}.pill{display:inline-block;background:#e8f0ff;color:#1d4ed8;border-radius:999px;padding:6px 10px;font-size:13px}.muted{color:var(--g)}.hidden{display:none}.media a{display:block;word-break:break-all;margin:6px 0;color:#1d4ed8}.media img{max-width:100%;border-radius:12px;margin-top:8px}.media iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;background:#e2e8f0}.btnlink{display:block;text-align:center;text-decoration:none;border-radius:13px;background:#16a34a;color:white;font-weight:800;padding:13px;margin-top:8px}.small{font-size:13px}.bar{position:fixed;left:0;right:0;bottom:0;background:#ffffffee;backdrop-filter:blur(8px);padding:10px 14px;border-top:1px solid #e2e8f0}.barin{max-width:820px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.logo{width:48px;height:48px;border-radius:14px;vertical-align:middle;margin-right:8px}.readonly .item{background:#fff}.share{background:#0ea5e9}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1><img src="icon-192.png" class="logo" alt="">모바일 작업지시서</h1>
    <div class="top"><button onclick="showAdmin()">관리자</button><button onclick="showUser()">사용자</button></div>
    <p id="status" class="muted small">Storage 없이 작동합니다. 사진/동영상은 Google Drive, YouTube 등의 공유링크를 저장합니다.</p>
  </div>
  <div id="admin"></div><div id="user"></div>
</div>
<div class="bar"><div class="barin"><button onclick="showAdmin()">관리자</button><button onclick="showUser()">사용자 보기</button></div></div>
<script src="firebase-config.js"></script>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import {getFirestore,collection,addDoc,setDoc,doc,onSnapshot,deleteDoc,serverTimestamp} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

const seed={date:'2026-06-11',product:'LEBEIGE',qty:'2,000개 (4,000매)',delivery:'완료되는 대로 납품',note:'※ 작업 중 의문 사항은 반드시 확인하시고 진행해 주세요.\n※ 한 줄, 두 줄 구분 / 500개 우선 작업 / 샘플 확인 필수',items:[['상깍지 테이프 작업','흰테이프 사용해서 한줄로 앞뒤 돌리기','상깍지 붙이기 작업 전에 샘플 확인'],['상깍지 사용','상깍지 2개 사용 (1개는 테이프 작업, 1개는 그냥 사용)','샘플 확인 필수'],['손잡이 글루건 작업','손잡이 글루건 작업 진행','글루건 작업 전 샘플 확인'],['옆선 테이프 작업','흰테이프 사용 / 선에서 5미리',''],['옆구리 붙이기 작업','선에서 2미리',''],['바닥 테이프 작업 (위쪽)','흰테이프 사용 / 일자(ㅡ) 모양',''],['바닥 테이프 작업 (아래쪽)','흰테이프 사용 / 돌리기','']].map((x,i)=>({no:i+1,title:x[0],desc:x[1],ref:x[2],photoUrl:'',videoUrl:''}))};
let fb=false,db,orders=[];
try{if(window.firebaseConfig && window.firebaseConfig.apiKey && !window.firebaseConfig.apiKey.includes('PASTE')){const app=initializeApp(window.firebaseConfig);db=getFirestore(app);fb=true;status.textContent='Firestore 연결됨 / Storage 사용 안 함';status.className='ok small';onSnapshot(collection(db,'workOrders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));renderAll();});}}catch(e){console.error(e);status.textContent='Firebase 설정 오류: 이 기기 임시저장으로 작동합니다.';status.className='warn small'}
if(!fb){orders=JSON.parse(localStorage.workOrdersFree||'null')||[{id:'sample',...seed}];renderAll()}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function saveLocal(){localStorage.workOrdersFree=JSON.stringify(orders);renderAll()}
async function saveOrder(o){if(fb){const data={...o,updatedAt:serverTimestamp()}; if(o.id) await setDoc(doc(db,'workOrders',o.id),data); else await addDoc(collection(db,'workOrders'),{...data,createdAt:serverTimestamp()});}else{o.id=o.id||Date.now()+'';const i=orders.findIndex(x=>x.id===o.id);if(i>=0)orders[i]=o;else orders.unshift(o);saveLocal();}}
async function removeOrder(id){if(fb) await deleteDoc(doc(db,'workOrders',id)); else {orders=orders.filter(o=>o.id!==id);saveLocal();}}
function itemHtml(it={}){return `<div class="item"><div class="row"><b>제목</b><input class="it-title" value="${esc(it.title)}"></div><div class="row"><b>설명</b><textarea class="it-desc">${esc(it.desc)}</textarea></div><div class="row"><b>참조</b><textarea class="it-ref">${esc(it.ref)}</textarea></div><div class="row"><b>사진링크</b><input class="it-photo" placeholder="Google Drive 사진 공유링크" value="${esc(it.photoUrl)}"></div><div class="row"><b>영상링크</b><input class="it-video" placeholder="YouTube/Drive 동영상 공유링크" value="${esc(it.videoUrl)}"></div></div>`}
function orderForm(o=structuredClone(seed)){return `<div class="card"><h2>관리자 입력</h2><div class="row"><b>작성일</b><input id="date" type="date" value="${esc(o.date)}"></div><div class="row"><b>제품명</b><input id="product" value="${esc(o.product)}"></div><div class="row"><b>수량</b><input id="qty" value="${esc(o.qty)}"></div><div class="row"><b>납품일</b><input id="delivery" value="${esc(o.delivery)}"></div><h3>작업 항목</h3><div id="items">${(o.items||[]).map(itemHtml).join('')}</div><button class="ghost" onclick="addItem()">+ 작업 항목 추가</button><h3>중요 안내사항</h3><textarea id="note">${esc(o.note)}</textarea><button onclick="saveCurrent('${o.id||''}')">저장</button><button onclick="exportCSV('${o.id||''}')">엑셀용 CSV 저장</button>${o.id?`<button class="danger" onclick="delCurrent('${o.id}')">삭제</button>`:''}<p class="muted small">사진/동영상 파일은 Google Drive에 올린 뒤 ‘링크가 있는 모든 사용자 보기 가능’으로 바꾸고 링크를 붙여넣으세요.</p></div>`}
window.addItem=()=>items.insertAdjacentHTML('beforeend',itemHtml());
window.saveCurrent=async(id)=>{const old=orders.find(x=>x.id===id)||{};const o={...old,id:id||old.id,date:date.value,product:product.value,qty:qty.value,delivery:delivery.value,note:note.value,items:[...document.querySelectorAll('.item')].map((el,i)=>({no:i+1,title:el.querySelector('.it-title').value,desc:el.querySelector('.it-desc').value,ref:el.querySelector('.it-ref').value,photoUrl:el.querySelector('.it-photo').value,videoUrl:el.querySelector('.it-video').value}))};await saveOrder(o);alert('저장 완료');};
window.delCurrent=id=>confirm('삭제할까요?')&&removeOrder(id);
window.newOrder=()=>admin.innerHTML=orderForm(structuredClone(seed));
window.editOrder=id=>admin.innerHTML=orderForm(orders.find(o=>o.id===id));
window.showAdmin=()=>{admin.classList.remove('hidden');user.classList.add('hidden');admin.innerHTML='<div class="card"><h2>관리자 모드</h2><button onclick="newOrder()">새 지시서 작성</button></div>'+orders.map(o=>`<div class="card"><b>${esc(o.product)}</b> <span class="pill">${esc(o.date)}</span><p class="muted">${esc(o.qty)} / ${esc(o.delivery)}</p><button onclick="editOrder('${o.id}')">수정</button></div>`).join('')};
window.showUser=()=>{user.classList.remove('hidden');admin.classList.add('hidden');user.innerHTML=orders.length?orders.map(viewHtml).join(''):'<div class="card"><h2>등록된 작업지시서가 없습니다.</h2><p>관리자 페이지에서 먼저 지시서를 등록해 주세요.</p></div>'};
function driveImage(url){const m=String(url).match(/\/d\/([^/]+)|id=([^&]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]||m[2]}&sz=w1000`:url}
function youtubeEmbed(url){const m=String(url).match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);return m?`https://www.youtube.com/embed/${m[1]}`:''}
function mediaHtml(i){let h='';if(i.photoUrl){h+=`<a href="${esc(i.photoUrl)}" target="_blank"><img src="${esc(driveImage(i.photoUrl))}" onerror="this.style.display='none';this.parentElement.textContent='사진 열기: ${esc(i.photoUrl)}'"></a>`}if(i.videoUrl){const y=youtubeEmbed(i.videoUrl);h+=y?`<iframe src="${esc(y)}" allowfullscreen></iframe><a href="${esc(i.videoUrl)}" target="_blank">동영상 원본 열기</a>`:`<a href="${esc(i.videoUrl)}" target="_blank">동영상 열기</a>`}return h}
function viewHtml(o){const share=encodeURIComponent(`작업지시서\n제품명: ${o.product}\n수량: ${o.qty}\n납품일: ${o.delivery}`);return `<div class="card readonly"><h2>${esc(o.product)}</h2><p><span class="pill">${esc(o.date)}</span></p><p><b>수량:</b> ${esc(o.qty)}<br><b>납품일:</b> ${esc(o.delivery)}</p>${(o.items||[]).map(i=>`<div class="item"><h3>작업 항목 ${i.no}. ${esc(i.title)}</h3><p>${esc(i.desc).replaceAll('\n','<br>')}</p><p class="muted">${esc(i.ref).replaceAll('\n','<br>')}</p><div class="media">${mediaHtml(i)}</div></div>`).join('')}<p>${esc(o.note).replaceAll('\n','<br>')}</p><a class="btnlink share" href="sms:?body=${share}">문자로 공유</a><button onclick="copyShare('${share}')">공유 문구 복사</button></div>`}
window.copyShare=async(t)=>{await navigator.clipboard.writeText(decodeURIComponent(t));alert('복사 완료. 카카오톡에 붙여넣으세요.');}
window.exportCSV=id=>{let o=orders.find(x=>x.id===id)||{date:date.value,product:product.value,qty:qty.value,delivery:delivery.value,note:note.value,items:[...document.querySelectorAll('.item')].map((el,i)=>({no:i+1,title:el.querySelector('.it-title').value,desc:el.querySelector('.it-desc').value,ref:el.querySelector('.it-ref').value,photoUrl:el.querySelector('.it-photo').value,videoUrl:el.querySelector('.it-video').value}))};let rows=[['작성일',o.date],['제품명',o.product],['수량',o.qty],['납품일',o.delivery],[],['No','작업항목','작업내용','참조','사진링크','영상링크'],...(o.items||[]).map(i=>[i.no,i.title,i.desc,i.ref,i.photoUrl,i.videoUrl]),[],['중요안내',o.note]];let csv='\ufeff'+rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`작업지시서_${o.date||Date.now()}.csv`;a.click();}
function renderAll(){showUser()} window.renderAll=renderAll; window.showUser=showUser; window.showAdmin=showAdmin;
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
